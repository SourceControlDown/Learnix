name: Secret Scanning (Gitleaks)

# Scans the repository for leaked secrets on every push and pull request.
# Uses the official gitleaks/gitleaks-action — no binary installation required.
# Allowlist rules are defined in .gitleaks.toml at the repo root.
#
# To scan locally (requires Docker):
#   npm run check:secrets

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan all commits in a PR,
          # not just the latest snapshot.
          fetch-depth: 0

      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Point to our custom config that has the allowlist for
          # documentation placeholder keys and .env.example files.
          GITLEAKS_CONFIG: .gitleaks.toml
          # Exit with a non-zero code if leaks are found (blocks the pipeline).
          GITLEAKS_ENABLE_COMMENTS: true
