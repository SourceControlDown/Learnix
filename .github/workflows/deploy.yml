name: Deploy to Azure

# Triggered on push to main branch.
# Builds Docker image → pushes to ACR → deploys to Container Apps.
# Frontend is deployed to Azure Static Web Apps via the built-in action.
# 
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
# (azure)        AZURE_CREDENTIALS               — JSON output of: az ad sp create-for-rbac --name "learnix-github-actions" --role Contributor --scopes /subscriptions/{subscription-id} --sdk-auth
# (acr img)      ACR_PASSWORD                    — ACR admin password
# (frontend app) AZURE_STATIC_WEB_APPS_API_TOKEN — from Azure Portal > Static Web App > Manage deployment token
# (postgress)    PROD_POSTGRES_CONN              — Azure PostgreSQL connection string
# (redis)        PROD_REDIS_CONN                 — Azure Redis connection string
# (mongo)        PROD_MONGO_CONN                 — Azure Cosmos DB MongoDB connection string
# (JWT)          PROD_JWT_SECRET                 — 64+ char random secret
# (JWT)          PROD_JWT_REFRESH_SECRET         — 64+ char random secret (Pepper for Refresh Tokens)
# (SMTP)         PROD_SMTP_PASSWORD              — SMTP password or app password
# (Google)       PROD_GOOGLE_CLIENT_SECRET       — Google OAuth client secret
# (AI)           PROD_ANTHROPIC_KEY              — Anthropic API key (or Gemini)
# (AI)           PROD_GEMINI_KEY                 — Gemini API key
# (seed)         PROD_SEED_ADMIN_PASSWORD        — Admin password for seeding
# (seed)         PROD_SEED_INSTRUCTOR_PASSWORD   — (Optional) Instructor password for seeding
# (seed)         PROD_SEED_STUDENT_PASSWORD      — (Optional) Student password for seeding
# (docker img)   DOCKERHUB_TOKEN                 — Docker Hub token
# (github)       ADMIN_PAT                       — PAT with 'repo' scope to bypass branch protection rules
#
# Required GitHub Variables (Settings → Secrets and variables → Actions → Variables):
# (backend img)  REGISTRY_TYPE                   — 'ACR' or 'DOCKERHUB'
# (docker img)   DOCKERHUB_USERNAME              — Docker Hub username
# (acr img)      ACR_LOGIN_SERVER                — e.g. learnixacr.azurecr.io or docker.io
# (acr img)      ACR_USERNAME                    — ACR admin username
# (backend)      CONTAINER_APP_NAME              — e.g. learnix-api
# (azure)        CONTAINER_APP_RG                — e.g. learnix-rg,  also used as TF_VAR_resource_group_name for Terraform
# (SMTP)         PROD_SMTP_HOST                  — SMTP server host (e.g., smtp.gmail.com)
# (SMTP)         PROD_SMTP_PORT                  — SMTP server port (e.g., 587)
# (SMTP)         PROD_SMTP_USERNAME              — SMTP username (e.g., noreply.learnix@gmail.com)
# (SMTP)         PROD_SMTP_SENDER_EMAIL          — From email address (e.g., noreply.learnix@gmail.com)
# (SMTP)         PROD_SMTP_SENDER_NAME           — From name (e.g., Learnix)
# (SMTP)         Smtp__EnableSsl                 — Note: Smtp__EnableSsl is explicitly set to "true" in this script.
# (Google)       PROD_GOOGLE_CLIENT_ID           — Google OAuth client ID
# (Mongo)        PROD_MONGO_DATABASE_NAME        — Name of the MongoDB database (e.g. learnix)
# (seed)         PROD_SEED_ADMIN_EMAIL           — Admin email for seeding
# (seed)         PROD_SEED_INSTRUCTOR_EMAIL      — (Optional) Instructor email for seeding
# (seed)         PROD_SEED_STUDENT_EMAIL         — (Optional) Student email for seeding
# (AI)           PROD_AICHAT_PROVIDER            — 'Gemini' or 'Anthropic'
# (cors)         PROD_ALLOWED_ORIGINS            — Frontend URL, e.g. https://learnix.azurestaticapps.net
# (frontend)     PROD_CLIENT_BASE_URL            — Same as PROD_ALLOWED_ORIGINS
# (frontend)     VITE_API_URL                    — Production API URL for frontend build
# (frontend)     VITE_SITE_URL                   — Public frontend origin, e.g. https://learnix.azurestaticapps.net
#                                                  (canonical URLs, og:image, sitemap.xml)
# (domain)       CUSTOM_DOMAIN                   — (Optional) Custom frontend domain to show in README.md

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  # 0. Detect changes to run jobs conditionally
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'Learnix.Backend/**'
              - 'infrastructure/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'learnix-client/**'
              - '.github/workflows/deploy.yml'

  # 1. Build & push API Docker image to ACR or Docker Hub
  build-api:
    name: Build API → ACR or Docker Hub
    runs-on: ubuntu-latest
    environment: Production
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
    - uses: actions/checkout@v4

    # 1.1 If REGISTRY_TYPE is 'ACR'
    - name: Log in to Azure Container Registry
      if: ${{ vars.REGISTRY_TYPE == 'ACR' }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ${{ vars.ACR_LOGIN_SERVER }}
        username: ${{ vars.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 1.1 If REGISTRY_TYPE is 'DOCKERHUB'
    - name: Log in to Docker Hub
      if: ${{ vars.REGISTRY_TYPE == 'DOCKERHUB' }}
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: docker.io
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 1.2 Metadata and build image
    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
      with:
        images: ${{ vars.REGISTRY_TYPE == 'ACR' && vars.ACR_LOGIN_SERVER || vars.DOCKERHUB_USERNAME }}/learnix-api
        tags: |
          type=sha,prefix=,format=short
          type=raw,value=latest

    # 1.3 Build and push API image
    - name: Build and push API image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: ./Learnix.Backend
        file: ./Learnix.Backend/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # 2. Deploy Infrastructure, Run Migrations, and Deploy API
  deploy-backend:
    name: Provision, Migrate & Deploy API
    runs-on: ubuntu-latest
    environment: Production
    needs: [changes, build-api]
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    # Setup .NET 8 (needed for DbMigrator)
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Authenticate to Azure ONCE
    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Provision Infrastructure
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

    - name: Terraform Init & Apply
      working-directory: ./infrastructure
      env:
        TF_VAR_resource_group_name: ${{ vars.CONTAINER_APP_RG }}
        # The same origin the API trusts for CORS, because the browser uploads straight to Blob Storage
        # and the storage account answers that preflight itself. Terraform takes a list, hence the JSON.
        TF_VAR_allowed_origins: '["${{ vars.PROD_ALLOWED_ORIGINS }}"]'
        ARM_USE_CLI: "true"
      run: |
        terraform init
        terraform apply -auto-approve

    # Extract connection string locally and save to GITHUB_ENV
    - name: Get Storage Connection String
      working-directory: ./infrastructure
      run: |
        CONN=$(terraform output -raw storage_connection_string)
        echo "::add-mask::$CONN"
        echo "BLOB_CONN=$CONN" >> $GITHUB_ENV

    # Run Database Migrations & Seeding
    - name: Run migrations and seeding
      working-directory: ./Learnix.Backend
      env:
        ConnectionStrings__Postgres: ${{ secrets.PROD_POSTGRES_CONN }}
        ConnectionStrings__AzureBlobStorage: ${{ env.BLOB_CONN }}
        # Without this the migrator's RedisCacheFlusher finds no connection string and quietly skips:
        # the cache then outlives the database it was built from, and after a re-seed `categories:all`
        # serves ids that no longer exist for the rest of its 24h TTL — the catalogue offers categories
        # that filter down to nothing (ADR-BACK-INFRA-014).
        ConnectionStrings__Redis: ${{ secrets.PROD_REDIS_CONN }}
        ASPNETCORE_ENVIRONMENT: Production
        SeedAdmin__Email: ${{ vars.PROD_SEED_ADMIN_EMAIL }}
        SeedAdmin__Password: ${{ secrets.PROD_SEED_ADMIN_PASSWORD }}
        SeedData__InstructorEmail: ${{ vars.PROD_SEED_INSTRUCTOR_EMAIL }}
        SeedData__InstructorPassword: ${{ secrets.PROD_SEED_INSTRUCTOR_PASSWORD }}
        SeedData__StudentEmail: ${{ vars.PROD_SEED_STUDENT_EMAIL }}
        SeedData__StudentPassword: ${{ secrets.PROD_SEED_STUDENT_PASSWORD }}
      run: dotnet run --project Learnix.DbMigrator --no-launch-profile -- --seed-demo

    # Configure Private Registry Credentials (Required for Docker Hub)
    - name: Configure Container App Registry
      env:
        # Through the environment, not interpolated into the script: an expanded secret ends up in the
        # command line, and anything that echoes the command leaks it.
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      run: |
        if [ "${{ vars.REGISTRY_TYPE }}" == "DOCKERHUB" ]; then
          az containerapp registry set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.CONTAINER_APP_RG }} \
            --server docker.io \
            --username ${{ vars.DOCKERHUB_USERNAME }} \
            --password "$DOCKERHUB_TOKEN"
        fi

    # Deploy to Container Apps using Azure CLI directly (Action v1 has bugs with spaces in env vars)
    - name: Deploy to Container Apps
      env:
        IMAGE_TAG: ${{ needs.build-api.outputs.image-tag }}
        PROD_POSTGRES_CONN: ${{ secrets.PROD_POSTGRES_CONN }}
        PROD_REDIS_CONN: ${{ secrets.PROD_REDIS_CONN }}
        PROD_MONGO_CONN: ${{ secrets.PROD_MONGO_CONN }}
        PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
        PROD_JWT_REFRESH_SECRET: ${{ secrets.PROD_JWT_REFRESH_SECRET }}
        PROD_SMTP_PASSWORD: ${{ secrets.PROD_SMTP_PASSWORD }}
        PROD_GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
        PROD_ANTHROPIC_KEY: ${{ secrets.PROD_ANTHROPIC_KEY }}
        PROD_GEMINI_KEY: ${{ secrets.PROD_GEMINI_KEY }}
        PROD_SEED_ADMIN_PASSWORD: ${{ secrets.PROD_SEED_ADMIN_PASSWORD }}
        PROD_SEED_INSTRUCTOR_PASSWORD: ${{ secrets.PROD_SEED_INSTRUCTOR_PASSWORD }}
        PROD_SEED_STUDENT_PASSWORD: ${{ secrets.PROD_SEED_STUDENT_PASSWORD }}
      run: |
        IMAGE="${{ vars.REGISTRY_TYPE == 'ACR' && vars.ACR_LOGIN_SERVER || format('docker.io/{0}', vars.DOCKERHUB_USERNAME) }}/learnix-api:$IMAGE_TAG"
        
        az containerapp update \
          --name ${{ vars.CONTAINER_APP_NAME }} \
          --resource-group ${{ vars.CONTAINER_APP_RG }} \
          --image "$IMAGE" \
          --replace-env-vars \
            ASPNETCORE_ENVIRONMENT="Production" \
            ASPNETCORE_URLS="http://+:8080" \
            ConnectionStrings__Postgres="$PROD_POSTGRES_CONN" \
            ConnectionStrings__Redis="$PROD_REDIS_CONN" \
            ConnectionStrings__AzureBlobStorage="${{ env.BLOB_CONN }}" \
            Mongo__ConnectionString="$PROD_MONGO_CONN" \
            Mongo__DatabaseName="${{ vars.PROD_MONGO_DATABASE_NAME }}" \
            Jwt__Secret="$PROD_JWT_SECRET" \
            Jwt__RefreshTokenSecret="$PROD_JWT_REFRESH_SECRET" \
            Jwt__Issuer="Learnix" \
            Jwt__Audience="LearnixClient" \
            Smtp__Host="${{ vars.PROD_SMTP_HOST }}" \
            Smtp__Port="${{ vars.PROD_SMTP_PORT }}" \
            Smtp__Username="${{ vars.PROD_SMTP_USERNAME }}" \
            Smtp__Password="$PROD_SMTP_PASSWORD" \
            Smtp__SenderEmail="${{ vars.PROD_SMTP_SENDER_EMAIL }}" \
            Smtp__SenderName="${{ vars.PROD_SMTP_SENDER_NAME }}" \
            Smtp__EnableSsl="true" \
            Google__ClientId="${{ vars.PROD_GOOGLE_CLIENT_ID }}" \
            Google__ClientSecret="$PROD_GOOGLE_CLIENT_SECRET" \
            AiChat__Provider="${{ vars.PROD_AICHAT_PROVIDER }}" \
            Anthropic__ApiKey="$PROD_ANTHROPIC_KEY" \
            Gemini__ApiKey="$PROD_GEMINI_KEY" \
            SeedAdmin__Email="${{ vars.PROD_SEED_ADMIN_EMAIL }}" \
            SeedAdmin__Password="$PROD_SEED_ADMIN_PASSWORD" \
            SeedData__InstructorEmail="${{ vars.PROD_SEED_INSTRUCTOR_EMAIL }}" \
            SeedData__InstructorPassword="$PROD_SEED_INSTRUCTOR_PASSWORD" \
            SeedData__StudentEmail="${{ vars.PROD_SEED_STUDENT_EMAIL }}" \
            SeedData__StudentPassword="$PROD_SEED_STUDENT_PASSWORD" \
            Cors__AllowedOrigins__0="${{ vars.PROD_ALLOWED_ORIGINS }}" \
            App__ClientBaseUrl="${{ vars.PROD_CLIENT_BASE_URL }}"
        # =========================================================================
        # WARNING: DO NOT ENABLE `Proxy__TrustedProxies__0` FOR AZURE CONTAINER APPS!
        # Azure Container Apps provides a managed, network-isolated Envoy Ingress.
        # The load balancer IP is dynamic. Hardcoding an IP here will cause ASP.NET
        # to drop X-Forwarded-For headers when the Azure infrastructure IP changes.
        # Our code gracefully handles this by falling back to "trust-all" when this 
        # variable is missing, which is the SAFE and CORRECT approach for ACA due 
        # to network isolation and ForwardLimit=1. 
        # ONLY enable this if migrating away from PaaS to a traditional VM/VPS setup.
        # If you ever do, pass the proxy list through `env:` — never expand a secret inline here.
        # =========================================================================

  # 3. Build & deploy frontend to Static Web Apps
  deploy-frontend:
    name: Deploy Frontend → Static Web Apps
    runs-on: ubuntu-latest
    environment: Production
    needs: [changes, deploy-backend]
    # Frontend deployment logic:
    # 1. We must use `always()`, otherwise GitHub skips this job automatically if `deploy-backend` was skipped.
    # 2. The frontend must have changes (`frontend == 'true'`), otherwise we do not build it.
    # 3. CRITICAL: If the backend is being deployed, it MUST succeed (`success`). If the backend fails (`failure`), the frontend is not deployed.
    #    The frontend is only deployed if the backend is successful (`success`) OR if the backend was completely skipped due to lack of changes (`skipped` + `backend != 'true'`).
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      (
        needs.deploy-backend.result == 'success' || 
        (needs.deploy-backend.result == 'skipped' && needs.changes.outputs.backend != 'true' && github.event_name != 'workflow_dispatch')
      )

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: learnix-client/package-lock.json

    - name: Install and build
      working-directory: ./learnix-client
      env:
        VITE_API_URL: ${{ vars.VITE_API_URL }}
        VITE_GOOGLE_CLIENT_ID: ${{ vars.PROD_GOOGLE_CLIENT_ID }}
        VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
      run: |
        npm ci
        npm run build

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "learnix-client/dist"
        output_location: ""
        skip_app_build: true

  # 4. Update README with the deployed URL
  update-readme:
    name: Update README with Live URL
    runs-on: ubuntu-latest
    environment: Production
    needs: [changes, deploy-frontend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.deploy-frontend.result == 'success'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.ADMIN_PAT }}
        # We need fetch-depth 0 to push back, though actions/checkout defaults to detached HEAD sometimes
        # Let's specify the branch so we can push directly
        ref: main

    - name: Update README.md
      run: |
        # Use CUSTOM_DOMAIN if set, otherwise fallback to PROD_ALLOWED_ORIGINS
        LIVE_URL="${{ vars.CUSTOM_DOMAIN }}"
        if [ -z "$LIVE_URL" ]; then
          LIVE_URL="${{ vars.PROD_ALLOWED_ORIGINS }}"
        fi
        
        if [ -z "$LIVE_URL" ]; then
          echo "No LIVE_URL found, skipping."
          exit 0
        fi
        
        # Create markdown link
        LINK="[${LIVE_URL}](${LIVE_URL})"
        
        # Replace everything between the start and end markers with the new link
        sed -i -e "s|<!-- LIVE_DEMO_START -->.*<!-- LIVE_DEMO_END -->|<!-- LIVE_DEMO_START -->${LINK}<!-- LIVE_DEMO_END -->|g" README.md

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if README.md was actually modified
        if git diff --exit-code README.md > /dev/null; then
          echo "No changes in README.md, skipping commit."
        else
          git add README.md
          git commit -m "docs: update live demo url in README [skip ci]"
          git push origin main
        fi
