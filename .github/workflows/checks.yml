name: Checks & Validation

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Learnix.Backend
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restore dependencies
      run: dotnet restore Learnix.Backend.slnx
    - name: Check formatting
      run: dotnet format Learnix.Backend.slnx --verify-no-changes
    - name: Build
      run: dotnet build Learnix.Backend.slnx --no-restore --configuration Release
    - name: Test
      run: dotnet test Learnix.Backend.slnx --no-build --configuration Release

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./learnix-client
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: learnix-client/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Format check
      run: npm run format:check
    - name: Lint
      run: npm run lint
    - name: Type check
      run: npm run type-check
    - name: Build (validates no TS errors)
      env:
        VITE_API_URL: https://placeholder.azurecontainerapps.io/api
        VITE_GOOGLE_CLIENT_ID: placeholder
      run: npm run build

  duplication:
    name: Code Duplication
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install root dependencies
      run: npm install
    - name: Run code duplication check
      run: npm run check:duplication

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true
