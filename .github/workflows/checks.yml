name: Checks & Validation

# Triggered on push to main/dev branches and all pull requests.
# Performs backend (build, test, SonarCloud analysis), frontend (build, format, lint, type check), 
# code duplication checks, and secret scanning (gitleaks).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → Secrets):
# (sonar)        SONAR_TOKEN                     — SonarCloud token for code quality analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    # Every step runs from the repository root: SonarScanner for .NET requires begin, build and end
    # to share a working directory, and that directory is what it indexes — so it has to be the root
    # for learnix-client to be analysed at all.
    steps:
    # 1. Checkout repository
    - uses: actions/checkout@v4

    # 2. Setup .NET and Java (Java is required for SonarScanner)
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Set up JDK 17 (Required for SonarCloud)
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'zulu'

    # The scanner analyses learnix-client too. SonarJS needs the client's node_modules to resolve
    # types from tsconfig — without them TypeScript is still parsed, but type-aware rules go quiet.
    - name: Setup Node.js 20 (for TypeScript analysis)
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: learnix-client/package-lock.json
    - name: Install frontend dependencies
      working-directory: ./learnix-client
      run: npm ci

    # 3. Install SonarScanner and restore dependencies
    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner
    - name: Restore dependencies
      run: dotnet restore Learnix.Backend/Learnix.Backend.slnx

    # 4. Enforce code formatting style
    - name: Check formatting
      run: dotnet format Learnix.Backend/Learnix.Backend.slnx --verify-no-changes

    # 5. Run static code analysis and test coverage
    #
    # Runs from the repository root, not ./Learnix.Backend: the scanner's base directory is what it
    # indexes, so anything above it — learnix-client — would never be analysed at all.
    #
    # sonar.exclusions: EF migrations are generated code; the Razor email templates are table-layout
    # HTML whose "deprecated" attributes are what makes them render in Outlook; mockups/ is a static
    # design artifact that ships to nobody; the rest is frontend build output and vendored code.
    #
    # sonar.coverage.exclusions: coverage is a backend metric. There are no frontend tests, so
    # without this the client's ~20k untested lines would count as "lines to cover" and drag the
    # project's coverage down by roughly half while telling us nothing new.
    #
    # sonar.issue.ignore: rules that are wrong *for this codebase*, each with its reason.
    #   S6759 (props must be Readonly<T>) — props are immutable by contract in React; wrapping every
    #   props type adds noise and catches nothing.
    #   S6479 (no array index as key) — every hit is a fixed-length list that is never reordered
    #   (4 avatars, 6 OTP boxes, JSON-LD blocks), so the index *is* the identity.
    #   S3358 (no nested ternary) — in JSX the loading/empty/data chain is the idiom; hoisting each one
    #   into a statement would push 25 render bodies out of the markup they describe.
    #   S7018 / S6473 (npm --ignore-scripts) — the frontend build *needs* lifecycle scripts: esbuild
    #   installs its platform binary in postinstall, and `npm ci --ignore-scripts` breaks vite build.
    #   S6437 (hard-coded password in PasswordInput.tsx) — it is the string "password", the input's
    #   type attribute, not a credential.
    #   S125 (commented-out code in index.html) — the SEO fallback tags are documented in a comment
    #   block that the analyser mistakes for dead markup.
    - name: Begin SonarScanner
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: >
        dotnet sonarscanner begin
        /k:"Learnix" /o:"oleh-bashtovyi"
        /d:sonar.token="$SONAR_TOKEN"
        /d:sonar.host.url="https://sonarcloud.io"
        /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"
        /d:sonar.exclusions="**/Persistence/EntityFramework/Migrations/**,**/Email/Templates/**,mockups/**,learnix-client/node_modules/**,learnix-client/dist/**,learnix-client/src/components/ui/**,**/*.min.js"
        /d:sonar.coverage.exclusions="learnix-client/**,infrastructure/**,**/*.mjs,**/*.config.*"
        /d:sonar.issue.ignore.multicriteria="e1,e2,e3,e4,e5,e6,e7"
        /d:sonar.issue.ignore.multicriteria.e1.ruleKey="typescript:S6759"
        /d:sonar.issue.ignore.multicriteria.e1.resourceKey="**/*.tsx"
        /d:sonar.issue.ignore.multicriteria.e2.ruleKey="typescript:S6479"
        /d:sonar.issue.ignore.multicriteria.e2.resourceKey="**/*.tsx"
        /d:sonar.issue.ignore.multicriteria.e3.ruleKey="typescript:S3358"
        /d:sonar.issue.ignore.multicriteria.e3.resourceKey="**/*.tsx"
        /d:sonar.issue.ignore.multicriteria.e4.ruleKey="docker:S7018"
        /d:sonar.issue.ignore.multicriteria.e4.resourceKey="**/Dockerfile"
        /d:sonar.issue.ignore.multicriteria.e5.ruleKey="githubactions:S7018"
        /d:sonar.issue.ignore.multicriteria.e5.resourceKey="**/*.yml"
        /d:sonar.issue.ignore.multicriteria.e6.ruleKey="typescript:S2068"
        /d:sonar.issue.ignore.multicriteria.e6.resourceKey="**/PasswordInput.tsx"
        /d:sonar.issue.ignore.multicriteria.e7.ruleKey="Web:S125"
        /d:sonar.issue.ignore.multicriteria.e7.resourceKey="learnix-client/index.html"

    # 6. Build the backend application
    - name: Build
      run: dotnet build Learnix.Backend/Learnix.Backend.slnx --no-restore --configuration Release

    # 7. Execute unit tests and collect code coverage
    - name: Test
      run: |
        dotnet test Learnix.Backend/Learnix.Backend.slnx \
          --no-build \
          --configuration Release \
          --collect:"XPlat Code Coverage" \
          --settings Learnix.Backend/coverage.runsettings

    # 8. Upload coverage results to SonarCloud
    - name: End SonarScanner
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./learnix-client
    steps:
    # 1. Checkout repository
    - uses: actions/checkout@v4

    # 2. Setup Node.js environment
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: learnix-client/package-lock.json

    # 3. Install project dependencies
    - name: Install dependencies
      run: npm ci

    # 4. Verify code formatting (Prettier)
    - name: Format check
      run: npm run format:check

    # 5. Run linter (ESLint)
    - name: Lint
      run: npm run lint

    # 6. Run TypeScript compiler for type checking
    - name: Type check
      run: npm run type-check

    # 7. Build frontend to validate there are no TypeScript or build errors
    - name: Build (validates no TS errors)
      env:
        VITE_API_URL: https://placeholder.azurecontainerapps.io/api
        VITE_GOOGLE_CLIENT_ID: placeholder
      run: npm run build

  duplication:
    name: Code Duplication
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout repository
    - uses: actions/checkout@v4

    # 2. Setup Node.js for running the duplication checker (jscpd)
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Install root dependencies to get the duplication script
    - name: Install root dependencies
      run: npm ci

    # 4. Execute duplication analysis across the codebase
    - name: Run code duplication check
      run: npm run check:duplication

    # 5. docs/backend/ENDPOINTS.md is generated from the controllers — fail if they have drifted apart
    - name: Check the documented API surface matches the controllers
      run: npm run check:endpoints

    # 6. ADRs are cited from prose and from C# comments — fail if a cited id has no ADR behind it
    - name: Check every referenced ADR id exists
      run: npm run check:adr

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # 1. Checkout repository with full history (fetch-depth: 0) to scan all past commits
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Run Gitleaks action to scan for committed secrets
      - name: Scan git history for secrets
        # Pinned to the commit v2 pointed at — a mutable tag would let the action change under us.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true
